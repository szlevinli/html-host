# Append these two location blocks into the existing 443 server block
# in /etc/nginx/conf.d/coffeedou.cc.conf

    # Uploaded HTML files served directly by nginx
    location /html/ {
        alias /var/www/html-host/;
        add_header X-Content-Type-Options nosniff;
    }

    # API reverse proxy to uvicorn
    location /html-upload-api/ {
        proxy_pass         http://127.0.0.1:8100/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 2m;
    }
